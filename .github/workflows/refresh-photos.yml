name: Refresh gallery photos from Google Photos

# Re-scrapes the school's shared Google Photos album and updates the
# PHOTO_URLS array in script.js. Runs every 6 hours and on manual trigger.

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/refresh-photos.yml"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      ALBUM_URL: "https://photos.app.goo.gl/QmVZnMwM94ZL4ix37"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch album & extract photo URLs
        run: |
          set -euo pipefail
          echo "Fetching $ALBUM_URL"
          curl -sL \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
            -H "Accept: text/html,application/xhtml+xml" \
            -H "Accept-Language: en-US,en;q=0.9" \
            "$ALBUM_URL" -o /tmp/album.html
          grep -oE 'https://lh3\.googleusercontent\.com/pw/[A-Za-z0-9_\-]+' /tmp/album.html \
            | sort -u > /tmp/photos.txt
          COUNT=$(wc -l < /tmp/photos.txt)
          echo "Found $COUNT photos"
          if [ "$COUNT" -lt 5 ]; then
            echo "Too few photos found ($COUNT) — aborting."
            exit 0
          fi

      - name: Rewrite PHOTO_URLS array in script.js
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import re, pathlib
          urls = [u.strip() for u in pathlib.Path('/tmp/photos.txt').read_text().splitlines() if u.strip()]
          if len(urls) < 5:
              raise SystemExit("Too few URLs to write")
          arr_lines = ['const PHOTO_URLS = [']
          for i, u in enumerate(urls):
              comma = ',' if i < len(urls) - 1 else ''
              arr_lines.append(f'  "{u}"{comma}')
          arr_lines.append('];')
          new_arr = '\n'.join(arr_lines)
          p = pathlib.Path('script.js')
          src = p.read_text()
          new_src, n = re.subn(r"const PHOTO_URLS = \[[\s\S]*?\];", new_arr, src, count=1)
          if n == 0:
              raise SystemExit("Could not find PHOTO_URLS block in script.js")
          p.write_text(new_src)
          print(f"Updated script.js with {len(urls)} photos")
          PYEOF

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet script.js; then
            echo "No changes — gallery already up to date."
          else
            git add script.js
            git commit -m "chore: refresh gallery photos from Google Photos album"
            git push
          fi

